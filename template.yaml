AWSTemplateFormatVersion: "2010-09-09"
Description: URL shortener

Parameters:
  AlertEmail:
    Type: String

  ApiKeyValue:
    Type: String
    NoEcho: true

Resources:

  LinksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  ClicksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  LinkShortenerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole

      Policies:
        - PolicyName: link-shortener-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                  - dynamodb:Scan
                Resource: !GetAtt LinksTable.Arn

              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt AnalyticsFunction.Arn

              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

  LinkAnalyticsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole

      Policies:
        - PolicyName: link-analytics-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !GetAtt ClicksTable.Arn

              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

  AuthorizerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole

      Policies:
        - PolicyName: link-authorizer-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: handler.handler
      Role: !GetAtt LinkShortenerRole.Arn

      Code:
        ZipFile: |
          def handler(event, context):
            return {
              "statusCode": 200,
              "body": "ok"
            }

      Environment:
        Variables:
          TABLE_NAME: !Ref LinksTable

  AnalyticsFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: analytics.handler
      Role: !GetAtt LinkAnalyticsRole.Arn

      Code:
        ZipFile: |
          def handler(event, context):
            return {
              "statusCode": 200
            }

      Environment:
        Variables:
          TABLE_NAME: !Ref ClicksTable

  AuthorizerFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: authorizer.handler
      Role: !GetAtt AuthorizerRole.Arn

      Code:
        ZipFile: |
          def handler(event, context):
            return {
              "isAuthorized": False
            }

      Environment:
        Variables:
          API_KEY: !Ref ApiKeyValue

  ApiGateway:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: link-shortener-api
      ProtocolType: HTTP

      CorsConfiguration:
        AllowOrigins:
          - "*"

        AllowMethods:
          - GET
          - POST
          - DELETE

        AllowHeaders:
          - Content-Type
          - x-api-key

  ApiAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref ApiGateway
      AuthorizerType: REQUEST
      AuthorizerPayloadFormatVersion: "2.0"
      EnableSimpleResponses: true

      IdentitySource:
        - "$request.header.x-api-key"

      Name: api-authorizer

      AuthorizerUri: !Sub
        - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AuthorizerArn}/invocations
        - AuthorizerArn: !GetAtt AuthorizerFunction.Arn

  LambdaIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt LambdaFunction.Arn
      PayloadFormatVersion: "2.0"

  RoutePost:
    Type: AWS::ApiGatewayV2::Route
    DependsOn:
      - ApiAuthorizer
      - LambdaIntegration

    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: "POST /links"
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref ApiAuthorizer

      Target: !Join
        - /
        - - integrations
          - !Ref LambdaIntegration

  RouteGet:
    Type: AWS::ApiGatewayV2::Route
    DependsOn:
      - LambdaIntegration

    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: "GET /{id}"

      Target: !Join
        - /
        - - integrations
          - !Ref LambdaIntegration

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    DependsOn:
      - RoutePost
      - RouteGet

    Properties:
      ApiId: !Ref ApiGateway
      StageName: "$default"
      AutoDeploy: true

      DefaultRouteSettings:
        ThrottlingRateLimit: 100
        ThrottlingBurstLimit: 200

  AuthorizerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AuthorizerFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com

      SourceArn: !Sub
        arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*/*

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com

      SourceArn: !Sub
        arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*/*

  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: link-shortener-alerts

      Subscription:
        - Protocol: email
          Endpoint: !Ref AlertEmail

  ErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: link-shortener-errors
      AlarmDescription: Fires when Lambda errors exceed threshold

      Namespace: AWS/Lambda
      MetricName: Errors

      Dimensions:
        - Name: FunctionName
          Value: !Ref LambdaFunction

      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5

      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

      AlarmActions:
        - !Ref AlertTopic

  Dashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: link-shortener

      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "width": 6,
              "height": 6,
              "properties": {
                "region": "${AWS::Region}",
                "title": "Lambda Invocations",
                "metrics": [
                  [
                    "AWS/Lambda",
                    "Invocations",
                    "FunctionName",
                    "${LambdaFunction}"
                  ]
                ],
                "period": 300,
                "stat": "Sum",
                "view": "timeSeries"
              }
            },
            {
              "type": "metric",
              "width": 6,
              "height": 6,
              "properties": {
                "region": "${AWS::Region}",
                "title": "Lambda Errors",
                "metrics": [
                  [
                    "AWS/Lambda",
                    "Errors",
                    "FunctionName",
                    "${LambdaFunction}"
                  ]
                ],
                "period": 300,
                "stat": "Sum",
                "view": "timeSeries"
              }
            },
            {
              "type": "metric",
              "width": 6,
              "height": 6,
              "properties": {
                "region": "${AWS::Region}",
                "title": "Lambda Duration",
                "metrics": [
                  [
                    "AWS/Lambda",
                    "Duration",
                    "FunctionName",
                    "${LambdaFunction}"
                  ]
                ],
                "period": 300,
                "stat": "Average",
                "view": "timeSeries"
              }
            },
            {
              "type": "metric",
              "width": 6,
              "height": 6,
              "properties": {
                "region": "${AWS::Region}",
                "title": "Analytics Invocations",
                "metrics": [
                  [
                    "AWS/Lambda",
                    "Invocations",
                    "FunctionName",
                    "${AnalyticsFunction}"
                  ]
                ],
                "period": 300,
                "stat": "Sum",
                "view": "timeSeries"
              }
            }
          ]
        }

Outputs:
  ApiUrl:
    Value: !GetAtt ApiGateway.ApiEndpoint

  LambdaFunctionName:
    Value: !Ref LambdaFunction

  AnalyticsFunctionName:
    Value: !Ref AnalyticsFunction

  AuthorizerFunctionName:
    Value: !Ref AuthorizerFunction