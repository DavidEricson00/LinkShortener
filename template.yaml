AWSTemplateFormatVersion: "2010-09-09"
Description: URL shortener

Parameters:
  AlertEmail:
    Type: String
    Description: Email to receive CloudWatch alerts

Resources:

  LinksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: links
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  ClicksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: clicks
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  # Role for link-shortener Lambda
  # Needs: read/write links table, invoke analytics Lambda, write logs
  LinkShortenerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: link-shortener-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: link-shortener-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                Resource: !GetAtt LinksTable.Arn
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:link-analytics
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

  # Role for link-analytics Lambda
  # Needs: write clicks table, write logs — nothing else
  LinkAnalyticsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: link-analytics-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: link-analytics-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !GetAtt ClicksTable.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: link-shortener
      Runtime: python3.12
      Handler: handler.handler
      Role: !GetAtt LinkShortenerRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
            return {"statusCode": 200, "body": "ok"}
      Environment:
        Variables:
          TABLE_NAME: links

  AnalyticsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: link-analytics
      Runtime: python3.12
      Handler: analytics.handler
      Role: !GetAtt LinkAnalyticsRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
            return {"statusCode": 200}
      Environment:
        Variables:
          TABLE_NAME: clicks

  ApiGateway:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: link-shortener-api
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - DELETE
        AllowHeaders:
          - Content-Type

  LambdaIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt LambdaFunction.Arn
      PayloadFormatVersion: "2.0"

  RoutePost:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: "POST /links"
      Target: !Sub integrations/${LambdaIntegration}

  RouteGet:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: "GET /{id}"
      Target: !Sub integrations/${LambdaIntegration}

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref ApiGateway
      StageName: "$default"
      AutoDeploy: true

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*/*

  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: link-shortener-alerts
      Subscription:
        - Protocol: email
          Endpoint: !Ref AlertEmail

  ErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: link-shortener-errors
      AlarmDescription: Fires when error rate exceeds 5%
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref LambdaFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic

  Dashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: link-shortener
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "width": 6,
              "height": 6,
              "properties": {
                "title": "Invocations",
                "metrics": [["AWS/Lambda", "Invocations", "FunctionName", "${LambdaFunction}"]],
                "period": 300,
                "stat": "Sum",
                "view": "timeSeries"
              }
            },
            {
              "type": "metric",
              "width": 6,
              "height": 6,
              "properties": {
                "title": "Errors",
                "metrics": [["AWS/Lambda", "Errors", "FunctionName", "${LambdaFunction}"]],
                "period": 300,
                "stat": "Sum",
                "view": "timeSeries"
              }
            },
            {
              "type": "metric",
              "width": 6,
              "height": 6,
              "properties": {
                "title": "Duration (ms)",
                "metrics": [["AWS/Lambda", "Duration", "FunctionName", "${LambdaFunction}"]],
                "period": 300,
                "stat": "Average",
                "view": "timeSeries"
              }
            },
            {
              "type": "metric",
              "width": 6,
              "height": 6,
              "properties": {
                "title": "Clicks",
                "metrics": [["AWS/Lambda", "Invocations", "FunctionName", "${AnalyticsFunction}"]],
                "period": 300,
                "stat": "Sum",
                "view": "timeSeries"
              }
            }
          ]
        }

Outputs:
  ApiUrl:
    Value: !GetAtt ApiGateway.ApiEndpoint
    Description: API Gateway URL