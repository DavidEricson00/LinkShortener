name: CI/CD

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest boto3

      - name: Run tests
        run: pytest lambda/test_handler.py lambda/test_authorizer.py -v

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    environment: AWS

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file template.yaml \
            --stack-name link-shortener \
            --capabilities CAPABILITY_NAMED_IAM
            --parameter-overrides \
              AlertEmail=${{ secrets.ALERT_EMAIL }} \
              ApiKeyValue=${{ secrets.API_KEY }}

      - name: Deploy Lambda code
        run: |
          cd lambda
          zip function.zip handler.py
          aws lambda update-function-code \
            --function-name link-shortener \
            --zip-file fileb://function.zip

          zip analytics.zip analytics.py
          aws lambda update-function-code \
            --function-name link-analytics \
            --zip-file fileb://analytics.zip

          zip authorizer.zip authorizer.py
          aws lambda update-function-code \
            --function-name link-authorizer \
            --zip-file fileb://authorizer.zip

      - name: Get API URL
        id: api_url
        run: |
          URL=$(aws cloudformation describe-stacks \
            --stack-name link-shortener \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Update frontend with API URL
        run: |
          sed -i "s|%%API_URL%%|${{ steps.api_url.outputs.url }}|g" frontend/index.html
          sed -i "s|%%API_KEY%%|${{ secrets.API_KEY }}|g" frontend/index.html

      - name: Create S3 bucket if not exists
        run: |
          aws s3 mb s3://link-shortener-${{ secrets.AWS_ACCOUNT_ID }} --region ${{ secrets.AWS_REGION }} || true

      - name: Disable ACL block on bucket
        run: |
          aws s3api put-bucket-ownership-controls \
            --bucket link-shortener-${{ secrets.AWS_ACCOUNT_ID }} \
            --ownership-controls Rules=[{ObjectOwnership=BucketOwnerPreferred}]

          aws s3api put-public-access-block \
            --bucket link-shortener-${{ secrets.AWS_ACCOUNT_ID }} \
            --public-access-block-configuration BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false

      - name: Configure bucket as static website
        run: |
          aws s3 website s3://link-shortener-${{ secrets.AWS_ACCOUNT_ID }} \
            --index-document index.html

      - name: Set bucket public policy
        run: |
          aws s3api put-bucket-policy \
            --bucket link-shortener-${{ secrets.AWS_ACCOUNT_ID }} \
            --policy '{
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Principal": "*",
                "Action": "s3:GetObject",
                "Resource": "arn:aws:s3:::link-shortener-${{ secrets.AWS_ACCOUNT_ID }}/*"
              }]
            }'

      - name: Deploy frontend to S3
        run: |
          aws s3 sync frontend/ s3://link-shortener-${{ secrets.AWS_ACCOUNT_ID }} \
            --acl public-read